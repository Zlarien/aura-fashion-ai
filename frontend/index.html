<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAISON AURA | Showroom Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Josefin+Sans:wght@300;400&family=DM+Mono:wght@400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0A0A0A;
            --surface-color: #111111;
            --text-color: #F5F0E8;
            --text-secondary: #6B6560;
            --accent-gold: #C9A84C;
            --accent-neon: #39FF14;
            --accent-color: #C9A84C; /* backward compat for JS inline styles */
            --border-color: rgba(201,168,76,0.3);
            --border-subtle: rgba(255,255,255,0.07);
            --font-display: 'Playfair Display', serif;
            --font-ui: 'Josefin Sans', sans-serif;
            --font-data: 'Cormorant Garamond', serif;
            --font-mono: 'DM Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        button, .mic-btn, .confirm-btn { cursor: pointer; }

        ::selection {
            background: rgba(201,168,76,0.3);
            color: var(--text-color);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-ui);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Background Grain Texture */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Top Bar */
        .top-bar {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-color);
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .logo {
            font-family: var(--font-ui);
            font-size: 11px;
            font-weight: 400;
            color: var(--accent-gold);
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        .subtitle {
            font-family: var(--font-ui);
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--accent-neon);
            animation: pulse-live 2s infinite;
        }

        @keyframes pulse-live {
            0% { opacity: 0.4; box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 0 4px rgba(57, 255, 20, 0); }
            100% { opacity: 0.4; box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .demo-indicator {
            display: none;
            color: var(--accent-gold);
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.1em;
            border: 1px solid var(--accent-gold);
            padding: 4px 12px;
            text-transform: uppercase;
            animation: flash 1s infinite alternate;
        }

        @keyframes flash {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }

        .transcript {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-secondary);
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mic-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }

        .mic-btn svg { width: 20px; height: 20px; fill: currentColor; }

        .mic-btn.recording {
            border-color: #ff3333;
            color: #ff3333;
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 51, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #ff3333;
            box-shadow: 0 0 8px #ff3333;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .status-dot.connected {
            background-color: var(--accent-neon);
            box-shadow: 0 0 8px var(--accent-neon);
        }

        /* Main Layout */
        .main-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            height: calc(100vh - 80px);
            z-index: 10;
        }

        .panel {
            background: var(--surface-color);
            border: 1px solid var(--border-subtle);
            border-radius: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .left-panel {
            width: 50%;
            height: 100%;
        }

        .right-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .right-top { height: 60%; }
        .right-bottom { height: 40%; display: flex; gap: 20px; }
        .right-bottom > div {
            flex: 1;
            background: var(--surface-color);
            border: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
        }

        /* Panel Headers */
        .panel-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            font-family: var(--font-ui);
            font-size: 10px;
            font-weight: 400;
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .header-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-neon);
            border-radius: 50%;
            animation: pulse-live 2s infinite;
        }

        /* Agent Logs Terminal */
        .logs-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.7;
            background: #080808;
        }

        .log-entry {
            margin-bottom: 12px;
            color: var(--text-color);
            opacity: 0.7;
            transition: opacity 0.5s ease, color 0.5s ease;
            padding: 6px 0;
            border-left: 2px solid var(--accent-gold);
            padding-left: 12px;
        }

        .log-entry.active {
            color: var(--accent-neon);
            opacity: 1;
            border-left-color: var(--accent-neon);
        }

        .cursor {
            display: inline-block;
            width: 7px;
            height: 14px;
            background: var(--accent-neon);
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Order Card */
        .order-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            flex: 1;
            overflow-y: auto;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .data-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .data-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .data-label {
            font-family: var(--font-ui);
            font-size: 10px;
            font-weight: 400;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .data-value {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 400;
            color: var(--text-color);
        }

        /* Price value — special Cormorant Garamond italic treatment */
        #val-qty-price {
            font-family: var(--font-data);
            font-style: italic;
            font-size: 28px;
            color: var(--text-color);
        }

        .stock-indicator {
            margin-top: 10px;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 0;
            overflow: hidden;
        }

        .stock-bar {
            height: 100%;
            width: 0%;
            transition: width 1s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .badge-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .badge-container.visible { opacity: 1; }

        .rec-badge {
            padding: 8px 24px;
            border-radius: 0;
            font-family: var(--font-ui);
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
        }

        .rec-badge.accept {
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            background: transparent;
        }

        .rec-badge.counter {
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            background: transparent;
        }

        .rec-badge.upsell {
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            background: transparent;
        }

        .rec-badge.suspend {
            color: #FFA500;
            border: 1px solid #FFA500;
            background: transparent;
        }

        .confirm-btn {
            background: transparent;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 16px 32px;
            font-family: var(--font-ui);
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.2em;
            transition: all 0.3s;
            text-transform: uppercase;
            display: none;
        }

        .confirm-btn.visible { display: block; }

        .confirm-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        /* Email Preview */
        .email-preview {
            background: linear-gradient(135deg, #fefefe 0%, #f8f6f2 100%);
            color: #1a1a1a;
            padding: 35px 30px;
            border-radius: 0;
            border-left: 3px solid var(--accent-gold);
            font-family: var(--font-data);
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            margin-top: 20px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.15);
        }

        .email-preview.visible { display: block; opacity: 1; }

        .receipt-preview {
            background: linear-gradient(135deg, #fefefe 0%, #f8f6f2 100%);
            color: #1a1a1a;
            padding: 35px 30px;
            border-radius: 0;
            border-left: 3px solid #FFA500;
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.5;
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            margin-top: 20px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.15);
            white-space: pre-wrap;
        }
        .receipt-preview.visible { display: block; opacity: 1; }

        .order-suspended-badge {
            color: #FFA500;
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.1em;
            border: 1px solid rgba(255,165,0,0.3);
            padding: 2px 6px;
            text-transform: uppercase;
        }

        .email-header {
            border-bottom: 1px solid #d4c5a9;
            padding-bottom: 12px;
            margin-bottom: 20px;
            font-family: var(--font-ui);
            font-size: 10px;
            color: #8a7e6b;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .email-body {
            font-family: var(--font-data);
            font-size: 16px;
            line-height: 1.9;
            letter-spacing: 0.2px;
        }

        /* Lists (Inventory & Orders) */
        .list-container {
            padding: 15px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-ui);
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .inv-name { flex: 1; }
        .inv-stock-container {
            width: 60px;
            height: 4px;
            background: rgba(255,255,255,0.08);
            margin-left: 10px;
            border-radius: 0;
        }
        .inv-stock-fill { height: 100%; transition: width 1s; border-radius: 0; }

        .order-buyer { color: var(--text-secondary); }
        .order-price {
            color: var(--accent-gold);
            font-family: var(--font-data);
            font-style: italic;
        }

        .total-revenue {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-ui);
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .rev-amount {
            color: var(--accent-gold);
            font-family: var(--font-data);
            font-style: italic;
            font-size: 22px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.5); border-radius: 0; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 51, 51, 0.08);
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 10px 20px;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.05em;
            transition: transform 0.3s;
            z-index: 100;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 1024px) {
            .main-container { flex-direction: column; height: auto; overflow-y: auto; }
            .left-panel, .right-panel { width: 100%; height: 500px; }
            body { overflow: auto; }
            .right-bottom { flex-direction: column; height: auto; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-container">
            <div class="logo">MAISON AURA</div>
            <div class="subtitle"><span class="live-dot"></span> LIVE SHOWROOM</div>
        </div>
        <div class="controls">
            <div class="demo-indicator" id="demoIndicator">DEMO MODE ACTIVE</div>
            <div class="transcript" id="transcriptDisplay">Waiting for audio...</div>
            <button class="mic-btn" id="micBtn" title="Hold to record">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
            <div class="status-dot" id="wsStatus" title="Disconnected"></div>
        </div>
    </div>

    <div class="main-container">
        <!-- Left Panel: Agent Logs -->
        <div class="panel left-panel">
            <div class="panel-header">
                <div class="header-dot"></div>
                AGENT PIPELINE
            </div>
            <div class="logs-container" id="logsContainer">
                <!-- Logs will be injected here -->
            </div>
        </div>

        <!-- Right Panels -->
        <div class="right-panel">
            <!-- Right Top: Active Order Card -->
            <div class="panel right-top">
                <div class="panel-header">ACTIVE DEAL ANALYSIS</div>
                <div class="order-content" id="orderContent">
                    <div class="data-grid">
                        <div class="data-item" id="di-buyer">
                            <span class="data-label">Buyer</span>
                            <span class="data-value" id="val-buyer">--</span>
                        </div>
                        <div class="data-item" id="di-store">
                            <span class="data-label">Store</span>
                            <span class="data-value" id="val-store">--</span>
                        </div>
                        <div class="data-item" id="di-item">
                            <span class="data-label">Item Model</span>
                            <span class="data-value" id="val-item">--</span>
                            <div class="stock-indicator"><div class="stock-bar" id="stockBar"></div></div>
                        </div>
                        <div class="data-item" id="di-qty">
                            <span class="data-label">Quantity / Price</span>
                            <span class="data-value" id="val-qty-price">--</span>
                        </div>
                    </div>
                    
                    <div class="badge-container" id="badgeContainer">
                        <span class="data-label">AURA Recommendation</span>
                        <div class="rec-badge" id="recBadge">ANALYZING</div>
                    </div>

                    <div class="email-preview" id="emailPreview">
                        <div class="email-header">
                            To: <span id="em-to"></span><br>
                            Subject: <span id="em-sub"></span>
                        </div>
                        <div class="email-body" id="em-body"></div>
                    </div>

                    <div class="receipt-preview" id="receiptPreview"></div>

                    <div style="display: flex; gap: 12px; margin-top: auto;">
                        <button class="confirm-btn" id="confirmBtn">CONFIRM ORDER</button>
                        <button class="confirm-btn" id="suspendBtn" style="border-color: #FFA500; color: #FFA500;">SUSPEND</button>
                    </div>
                </div>
            </div>

            <!-- Right Bottom: Widgets -->
            <div class="right-bottom">
                <div class="panel">
                    <div class="panel-header">LIVE INVENTORY</div>
                    <div class="list-container" id="inventoryList">
                        <!-- Inventory injected here -->
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-header">CONFIRMED ORDERS</div>
                    <div class="list-container" id="ordersList">
                        <!-- Orders injected here -->
                    </div>
                    <div class="total-revenue">
                        <span>TOTAL REVENUE</span>
                        <span class="rev-amount" id="totalRev">€0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Error message</div>

    <script>
        // DOM Elements
        const wsStatus = document.getElementById('wsStatus');
        const micBtn = document.getElementById('micBtn');
        const transcriptDisplay = document.getElementById('transcriptDisplay');
        const logsContainer = document.getElementById('logsContainer');
        const demoIndicator = document.getElementById('demoIndicator');
        const toast = document.getElementById('toast');
        
        const confirmBtn = document.getElementById('confirmBtn');
        const suspendBtn = document.getElementById('suspendBtn');
        const badgeContainer = document.getElementById('badgeContainer');
        const recBadge = document.getElementById('recBadge');
        const stockBar = document.getElementById('stockBar');
        const emailPreview = document.getElementById('emailPreview');
        const receiptPreview = document.getElementById('receiptPreview');

        // WebSocket Setup
        let ws;
        let isConnected = false;
        // Expose for testing via console/Playwright
        Object.defineProperty(window, 'auraWS', { get: () => ws });

        // Auto-detect WebSocket URL: wss:// for deployed, ws:// for localhost
        const WS_URL = (() => {
            // file:// protocol or localhost → always connect to local backend
            if (!location.hostname || location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
                return 'ws://localhost:8000/ws';
            }
            // Deployed: use Railway backend URL (update this after Railway deploy)
            const RAILWAY_HOST = 'RAILWAY_URL_PLACEHOLDER';
            if (RAILWAY_HOST.includes('PLACEHOLDER')) {
                // Fallback: assume backend is on same host
                const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
                return `${proto}//${location.host}/ws`;
            }
            return `wss://${RAILWAY_HOST}/ws`;
        })();

        function connectWS() {
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                isConnected = true;
                wsStatus.classList.add('connected');
                wsStatus.title = "Connected";
                ws.send(JSON.stringify({ type: 'get_inventory' }));
            };

            ws.onclose = () => {
                isConnected = false;
                wsStatus.classList.remove('connected');
                wsStatus.title = "Disconnected";
                setTimeout(connectWS, 3000); // Reconnect
            };

            ws.onerror = (err) => {
                showError("WebSocket connection error");
            };

            ws.onmessage = async (event) => {
                // If it's Blob, it might be binary audio, but backend sends JSON
                if (event.data instanceof Blob) return;
                
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch(e) {
                    console.error("Failed to parse message", e);
                }
            };
        }

        // Message Handler
        function handleMessage(msg) {
            switch(msg.type) {
                case 'agent_log':
                    appendLog(msg.agent, msg.label, msg.content, msg.data);
                    break;
                case 'recommendation':
                    updateOrderCard(msg);
                    showRecommendation(msg.action);
                    break;
                case 'confirmation_email':
                    showEmail(msg.content);
                    break;
                case 'payment_receipt':
                    showReceipt(msg.content);
                    break;
                case 'order_suspended':
                    showSuspendedNotice(msg);
                    break;
                case 'voice_command':
                    handleVoiceCommand(msg.action);
                    break;
                case 'suspended':
                    renderSuspended(msg.orders);
                    break;
                case 'tts_audio':
                    playAudio(msg.audio);
                    break;
                case 'inventory':
                    renderInventory(msg.items);
                    break;
                case 'orders':
                    renderOrders(msg.orders, msg.total_revenue);
                    break;
                case 'transcript':
                    transcriptDisplay.textContent = msg.text;
                    if(msg.is_final) transcriptDisplay.style.color = "var(--text-color)";
                    else transcriptDisplay.style.color = "rgba(255, 255, 255, 0.5)";
                    break;
                case 'error':
                    showError(msg.message);
                    break;
                case 'recording_started':
                    console.log('Recording session started on backend');
                    break;
                case 'recording_stopped':
                    console.log('Recording session stopped on backend');
                    break;
            }
        }

        // Audio Recording
        let mediaRecorder;
        let isRecording = false;

        micBtn.addEventListener('click', toggleRecording);

        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            if(!isConnected) return showError("Not connected to backend");
            try {
                ws.send(JSON.stringify({ type: 'start_recording' }));
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true }
                });

                const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const source = audioCtx.createMediaStreamSource(stream);
                const processor = audioCtx.createScriptProcessor(4096, 1, 1);

                processor.onaudioprocess = (e) => {
                    if (ws.readyState !== WebSocket.OPEN) return;
                    const float32 = e.inputBuffer.getChannelData(0);
                    const int16 = new Int16Array(float32.length);
                    for (let i = 0; i < float32.length; i++) {
                        const s = Math.max(-1, Math.min(1, float32[i]));
                        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    ws.send(int16.buffer);
                };

                source.connect(processor);
                processor.connect(audioCtx.destination);

                mediaRecorder = { stream, audioCtx, processor, source };
                micBtn.classList.add('recording');
                isRecording = true;
                transcriptDisplay.textContent = "Listening...";
                transcriptDisplay.style.color = "rgba(255, 255, 255, 0.5)";
            } catch(e) {
                showError("Microphone access denied");
            }
        }

        function stopRecording() {
            if (mediaRecorder) {
                if (mediaRecorder.processor) {
                    mediaRecorder.processor.disconnect();
                    mediaRecorder.source.disconnect();
                    mediaRecorder.audioCtx.close();
                    mediaRecorder.stream.getTracks().forEach(t => t.stop());
                } else if (mediaRecorder.state && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                    mediaRecorder.stream.getTracks().forEach(t => t.stop());
                }
                micBtn.classList.remove('recording');
                isRecording = false;
                if(ws && isConnected) {
                    ws.send(JSON.stringify({ type: 'stop_recording' }));
                }
                mediaRecorder = null;
            }
        }

        // Audio Playback
        async function playAudio(base64Audio) {
            try {
                const audioData = atob(base64Audio);
                const arrayBuffer = new ArrayBuffer(audioData.length);
                const view = new Uint8Array(arrayBuffer);
                for (let i = 0; i < audioData.length; i++) {
                    view[i] = audioData.charCodeAt(i);
                }
                
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioCtx.destination);
                source.start(0);
            } catch(e) {
                console.error("Failed to play audio", e);
            }
        }

        // UI Updates
        let activeLogEl = null;

        function appendLog(agentNum, label, content, data) {
            if(activeLogEl) {
                activeLogEl.classList.remove('active');
                const cursor = activeLogEl.querySelector('.cursor');
                if(cursor) cursor.remove();
            }

            const div = document.createElement('div');
            div.className = 'log-entry active';
            const prefix = `[AGENT ${agentNum} — ${label}] `;
            div.innerHTML = `<span style="color: rgba(255,255,255,0.4)">${prefix}</span><span class="text-content"></span><span class="cursor"></span>`;
            logsContainer.appendChild(div);
            
            // Auto scroll
            logsContainer.scrollTop = logsContainer.scrollHeight;
            activeLogEl = div;

            const textSpan = div.querySelector('.text-content');
            let i = 0;
            const fullText = content;
            
            function typeWriter() {
                if(i < fullText.length) {
                    textSpan.textContent += fullText.charAt(i);
                    i++;
                    logsContainer.scrollTop = logsContainer.scrollHeight;
                    setTimeout(typeWriter, 20);
                }
            }
            typeWriter();
        }

        // Store current recommendation message for use by confirm
        let currentRec = null;

        function updateOrderCard(msg) {
            currentRec = msg;
            const ext = msg.extracted || {};
            const inv = msg.inventory || {};
            const strategy = msg.data || {};

            if(ext.buyer) {
                document.getElementById('val-buyer').textContent = ext.buyer;
                document.getElementById('di-buyer').classList.add('visible');
            }
            if(ext.store) {
                document.getElementById('val-store').textContent = ext.store;
                document.getElementById('di-store').classList.add('visible');
            }
            if(ext.item) {
                document.getElementById('val-item').textContent = ext.item + (inv.collection ? ` — ${inv.collection}` : '');
                document.getElementById('di-item').classList.add('visible');
                
                // Stock bar from inventory data
                const maxStock = Math.max(inv.available_qty || 0, inv.requested_qty || 1);
                const stockPercent = inv.available_qty ? Math.round((inv.available_qty / maxStock) * 100) : 0;
                stockBar.style.width = `${stockPercent}%`;
                // Color based on whether stock is sufficient
                if (inv.stock_sufficient === false) {
                    stockBar.style.background = '#ff3333';
                } else if(stockPercent > 75) {
                    stockBar.style.background = 'var(--accent-color)';
                } else if(stockPercent > 25) {
                    stockBar.style.background = '#FFA500';
                } else {
                    stockBar.style.background = '#ff3333';
                }
            }
            const qty = strategy.suggested_quantity || ext.quantity;
            const price = strategy.suggested_price || ext.price;
            if(qty && price) {
                document.getElementById('val-qty-price').textContent = `${qty} units @ €${Number(price).toLocaleString()}`;
                document.getElementById('di-qty').classList.add('visible');
            }
        }

        function showRecommendation(action) {
            // Reset state for new deal
            receiptPreview.classList.remove('visible');
            emailPreview.classList.remove('visible');
            suspendBtn.textContent = 'SUSPEND';
            suspendBtn.style.pointerEvents = '';
            suspendBtn.style.background = 'transparent';
            suspendBtn.style.color = '#FFA500';
            confirmBtn.textContent = 'CONFIRM ORDER';
            confirmBtn.style.pointerEvents = '';
            confirmBtn.style.background = 'transparent';
            confirmBtn.style.color = 'var(--text-color)';

            badgeContainer.classList.add('visible');
            recBadge.className = `rec-badge ${action.toLowerCase()}`;
            const labels = { ACCEPT: 'ACCEPT', COUNTER: 'COUNTER-OFFER', UPSELL: 'UPSELL', SUSPEND: 'SUSPEND' };
            recBadge.textContent = labels[action] || action;

            if (action === 'SUSPEND') {
                confirmBtn.classList.remove('visible');
                suspendBtn.classList.add('visible');
            } else {
                confirmBtn.classList.add('visible');
                suspendBtn.classList.add('visible');
            }
        }

        confirmBtn.addEventListener('click', () => {
            if(ws && isConnected) {
                ws.send(JSON.stringify({ type: 'confirm' }));
                confirmBtn.textContent = "CONFIRMED";
                confirmBtn.style.pointerEvents = "none";
                confirmBtn.style.background = "var(--accent-color)";
                confirmBtn.style.color = "var(--bg-color)";
                confirmBtn.style.animation = "none";
                demoIndicator.style.display = 'none';
                receiptPreview.classList.remove('visible');
            }
        });

        suspendBtn.addEventListener('click', () => {
            if(ws && isConnected) {
                ws.send(JSON.stringify({ type: 'suspend' }));
                suspendBtn.textContent = "SUSPENDED";
                suspendBtn.style.pointerEvents = "none";
                suspendBtn.style.background = "#FFA500";
                suspendBtn.style.color = "var(--bg-color)";
                confirmBtn.classList.remove('visible');
                demoIndicator.style.display = 'none';
            }
        });

        function handleVoiceCommand(action) {
            // Triggered when the backend detects a voice command (user said "confirmed" or "suspend")
            if (action === 'confirm') {
                confirmBtn.textContent = "CONFIRMED";
                confirmBtn.style.pointerEvents = "none";
                confirmBtn.style.background = "var(--accent-color)";
                confirmBtn.style.color = "var(--bg-color)";
                confirmBtn.style.animation = "none";
                demoIndicator.style.display = 'none';
                receiptPreview.classList.remove('visible');
                // Show voice confirmation toast
                toast.textContent = "Voice confirmed — processing order";
                toast.style.borderColor = 'var(--accent-color)';
                toast.style.color = 'var(--accent-color)';
                toast.style.background = 'rgba(201,168,76,0.08)';
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); toast.style.borderColor = ''; toast.style.color = ''; toast.style.background = ''; }, 3000);
            } else if (action === 'suspend') {
                suspendBtn.textContent = "SUSPENDED";
                suspendBtn.style.pointerEvents = "none";
                suspendBtn.style.background = "#FFA500";
                suspendBtn.style.color = "var(--bg-color)";
                confirmBtn.classList.remove('visible');
                demoIndicator.style.display = 'none';
            }
        }

        function showEmail(content) {
            // Backend sends raw email text as a string
            const lines = (typeof content === 'string' ? content : '').split('\n');
            let subject = '';
            let body = '';
            let inBody = false;
            for (const line of lines) {
                if (line.startsWith('Subject:')) {
                    subject = line.replace('Subject:', '').trim();
                } else if (line.startsWith('Dear') || inBody) {
                    inBody = true;
                    body += line + '\n';
                }
            }
            const buyerName = currentRec?.extracted?.buyer || 'Client';
            document.getElementById('em-to').textContent = buyerName;
            document.getElementById('em-sub').textContent = subject || 'Order Confirmation';
            document.getElementById('em-body').innerHTML = (body || content || '')
                .split('\n\n')
                .filter(p => p.trim())
                .map(p => `<p style="margin: 0 0 14px 0">${p.replace(/\n/g, '<br>')}</p>`)
                .join('');
            emailPreview.classList.add('visible');
        }

        function showReceipt(content) {
            receiptPreview.textContent = content || '';
            receiptPreview.classList.add('visible');
        }

        function showSuspendedNotice(msg) {
            const buyer = msg.buyer || 'Unknown';
            toast.textContent = `Deal with ${buyer} suspended — on hold`;
            toast.style.borderColor = '#FFA500';
            toast.style.color = '#FFA500';
            toast.style.background = 'rgba(255,165,0,0.08)';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
                toast.style.borderColor = '';
                toast.style.color = '';
                toast.style.background = '';
            }, 3000);
        }

        function renderInventory(items) {
            const container = document.getElementById('inventoryList');
            container.innerHTML = '';
            const maxStock = Math.max(...items.map(i => i.stock_qty || 0), 1);
            items.forEach(item => {
                const pct = ((item.stock_qty || 0) / maxStock) * 100;
                let color = pct > 75 ? 'var(--accent-color)' : (pct > 25 ? '#FFA500' : '#ff3333');
                const critical = item.stock_qty === 0;
                
                container.innerHTML += `
                    <div class="list-item" style="${critical ? 'background: rgba(255,51,51,0.08); border-bottom-color: rgba(255,51,51,0.2);' : ''}">
                        <span class="inv-name" style="${critical ? 'color: #ff3333; font-weight: 600;' : ''}">${item.item_name}</span>
                        <span style="font-family: var(--font-mono); min-width: 30px; text-align: right; ${critical ? 'color: #ff3333; font-weight: 600;' : ''}">${item.stock_qty}</span>
                        <div class="inv-stock-container">
                            <div class="inv-stock-fill" style="width: ${pct}%; background: ${color}"></div>
                        </div>
                    </div>
                `;
            });
        }

        // Animate numbers count up
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = "€" + Math.floor(progress * (end - start) + start).toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function renderOrders(orders, totalRev) {
            const container = document.getElementById('ordersList');
            container.innerHTML = '';
            if (orders.length === 0) {
                container.innerHTML = '<div style="color: rgba(255,255,255,0.3); font-size: 12px; text-align: center; padding: 20px;">No confirmed orders yet</div>';
            }
            orders.forEach(o => {
                const total = (o.agreed_price_eur || 0) * (o.quantity || 0);
                container.innerHTML += `
                    <div class="list-item">
                        <span class="order-buyer">${o.buyer_name}</span>
                        <span>${o.item_name} (x${o.quantity})</span>
                        <span class="order-price">&euro;${total.toLocaleString()}</span>
                    </div>
                `;
            });

            const revEl = document.getElementById('totalRev');
            const currentRev = parseInt(revEl.textContent.replace(/\D/g,'')) || 0;
            animateValue(revEl, currentRev, totalRev, 1000);
        }

        function renderSuspended(orders) {
            if (!orders || orders.length === 0) return;
            const container = document.getElementById('ordersList');
            orders.forEach(o => {
                const total = (o.agreed_price_eur || 0) * (o.quantity || 0);
                container.innerHTML += `
                    <div class="list-item" style="border-bottom-color: rgba(255,165,0,0.2);">
                        <span class="order-buyer">${o.buyer_name}</span>
                        <span>${o.item_name} (x${o.quantity})</span>
                        <span class="order-suspended-badge">HELD</span>
                        <span class="order-price" style="color: #FFA500;">&euro;${total.toLocaleString()}</span>
                    </div>
                `;
            });
        }

        function showError(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Demo Mode (Shift+D)
        document.addEventListener('keydown', (e) => {
            if(e.shiftKey && e.key.toLowerCase() === 'd') {
                if(ws && isConnected) {
                    ws.send(JSON.stringify({ type: 'demo' }));
                    demoIndicator.style.display = 'block';
                }
            }
        });

        // Init
        connectWS();

    </script>
</body>
